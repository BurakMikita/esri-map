<div class="satellites-container">
  <arcgis-scene
    #scene
    class="scene-view"
    basemap="satellite"
    ground="world-elevation"
    (arcgisViewReadyChange)="onSceneViewReady()"
  >
    <arcgis-expand
      slot="top-right"
      expanded
      mode="floating"
      visual-scale="m"
      expand-icon="search"
      expand-tooltip="Ricerca visibilità satelliti"
      auto-collapse="false"
    >
      @if (view) {
        <app-visibility-search
          [view]="view"
          (search)="onVisibilitySearch($event)">
        </app-visibility-search>
      }
    </arcgis-expand>
  </arcgis-scene>

  <div class="results-panel" *ngIf="visibilityResults.length > 0 || isSearching">
    <div class="results-header">
      <h3>Risultati di visibilità</h3>
      <button class="close-btn" (click)="visibilityResults = []; isSearching = false;">&times;</button>
    </div>

    <div *ngIf="isSearching" class="loading-state">
      Calcolo in corso...
    </div>

    <div *ngIf="!isSearching && visibilityResults.length === 0" class="empty-state">
      Nessuna intersezione nell'intervallo specificato.
    </div>

    <div class="table-container" *ngIf="!isSearching && visibilityResults.length > 0">
      <table>
        <thead>
          <tr>
            <th>Satellite</th>
            <th>Data e ora</th>
            <th>Altitudine (km)</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let res of visibilityResults">
            <td>{{ res.satellite }}</td>
            <td>{{ res.time | date:'medium' }}</td>
            <td>{{ res.altitude }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
