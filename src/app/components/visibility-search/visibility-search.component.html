<div class="visibility-search-panel">
  <h3>Ricerca Visibilità</h3>
  
  <div class="form-group">
    <label>Geometria (disegna sulla mappa):</label>
    <div class="sketch-wrapper" style="min-height: 50px; display: block; position: relative;">
      <div #sketchContainer class="sketch-container calcite-mode-light" style="width: 100%;"></div>
    </div>
  </div>

  <div class="form-group">
    <label for="startDate">Inizio intervallo:</label>
    <input type="datetime-local" id="startDate" [(ngModel)]="startDate" class="form-control" />
  </div>

  <div class="form-group">
    <label for="endDate">Fine intervallo:</label>
    <input type="datetime-local" id="endDate" [(ngModel)]="endDate" class="form-control" />
  </div>

  <div class="form-group">
    <label for="satellites">Satelliti:</label>
    <select id="satellites" multiple [(ngModel)]="selectedSatellites" class="form-control">
      <option *ngFor="let sat of availableSatellites" [value]="sat.id">
        {{ sat.name }}
      </option>
    </select>
    <small>Tieni premuto Ctrl (o Cmd) per selezionarne più di uno</small>
  </div>

  <button class="btn-search" (click)="onSearch()">Cerca</button>
</div>
